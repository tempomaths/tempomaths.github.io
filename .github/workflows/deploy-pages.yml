name: Publier TempoMaths

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Verifier l'application
        run: npm test

      - name: Construire le site
        run: npm run build

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparer le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publier
        id: deployment
        uses: actions/deploy-pages@v4
